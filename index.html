<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Personality Quiz</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- START SCREEN -->
  <div class="container" id="startScreen">

    <h1>Color Personality Quiz</h1>

    <p class="instructions">
      Welcome to the Color Personality Quiz!
      <br><br>
      You will answer 10 personality questions.
      <br><br>
      Choose the option that best describes you.
      <br><br>
      At the end of the quiz, you will discover your personality color.
    </p>

    <button id="startBtn">Start Quiz</button>

  </div>

  <!-- QUIZ SCREEN -->
  <div class="container hidden" id="quizContainer">

    <div id="quiz"></div>

    <div id="result" class="hidden"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
